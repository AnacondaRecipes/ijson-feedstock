{% set name = "ijson" %}
{% set version = "3.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 94688760720e3f5212731b3cb8d30267f9a045fb38fb3870254e7b9504246f31

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: true  # [py<39]
  # Remove it when yajl backend will work on windows
  missing_dso_whitelist:
    - $RPATH/yajl.dll  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - pip
    - python
    - setuptools >=77.0
    - yajl 2.1.0  # [not win]
  run:
    - python
    - yajl >=2.1.0,<3.0.0  # [not win]

# E ijson.common.IncompleteJSONError: parse error: trailing garbage
# E                "meta": []     }   ] }  {   "docs": [     {       "null
# E                      (right here) ------^
{% set deselect_tests = "--deselect=tests/test_basic_parse.py::test_multiple_values" %}

test:
  imports:
    - ijson
    - ijson.backends
    - ijson.common
    - ijson.utils
  requires:
    - pip
    - pytest
  source_files:
    - tests
  commands:
    - pip check
    - python -c "import ijson; assert ijson.backend == 'yajl2_c'"  # [not win]
    - pytest -v tests {{ deselect_tests }}

about:
  home: https://github.com/ICRAR/ijson
  license: BSD-3-Clause AND ISC
  license_family: BSD
  license_file: LICENSE.txt
  summary: Ijson is an iterative JSON parser with a standard Python iterator interface.
  description: Ijson is an iterative JSON parser with standard Python iterator interfaces.
  doc_url: https://github.com/ICRAR/ijson
  dev_url: https://github.com/ICRAR/ijson

extra:
  recipe-maintainers:
    - rmax
    - thermokarst
